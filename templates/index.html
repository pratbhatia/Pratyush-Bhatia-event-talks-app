<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google BigQuery Release Insights | Dashboard</title>
  <meta name="description" content="A premium modern developer dashboard to track, search, filter, and share Google BigQuery release notes and updates.">
  
  <!-- Modern Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

  <div class="app-container">
    
    <!-- Header Section -->
    <header>
      <div class="header-top">
        <div class="title-group">
          <!-- Custom Vector GCP Colorized Shield Logo -->
          <svg class="gcp-logo" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3z"/>
            <path fill="#34A853" d="M19.35 10.04c-.23-1.18-.74-2.27-1.47-3.19l-1.32 1.32c.45.58.77 1.25.92 1.98l1.87-.11z"/>
            <path fill="#EA4335" d="M12 4c1.68 0 3.22.56 4.47 1.5l1.32-1.32C16.14 2.72 14.17 2 12 2 8.1 2 4.79 4.41 3.51 7.82l1.87.57C6.18 5.86 8.87 4 12 4z"/>
          </svg>
          <h1 id="app-title">BigQuery Release Insights</h1>
        </div>
        
        <div class="control-panel">
          <div class="update-status">
            <span class="pulse-dot"></span>
            <span>Last checked: <strong id="last-updated-time">Just now</strong></span>
          </div>
          <button id="btn-export" class="btn-export" aria-label="Export release notes to CSV">
            <svg viewBox="0 0 24 24" style="width: 18px; height: 18px; fill: currentColor;">
              <path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"/>
            </svg>
            Export CSV
          </button>
          <button id="btn-refresh" class="btn-refresh" aria-label="Refresh release notes feed">
            <svg viewBox="0 0 24 24">
              <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
            Refresh
          </button>
        </div>
      </div>
      
      <!-- Stats Banner Overview -->
      <div class="stats-grid" role="region" aria-label="Updates statistics counts">
        <div class="stat-card">
          <div class="stat-val" id="stat-total-val">0</div>
          <div class="stat-label">Total Logs</div>
        </div>
        <div class="stat-card" style="border-bottom: 2px solid var(--color-feature);">
          <div class="stat-val" style="color: var(--color-feature);" id="stat-feature-val">0</div>
          <div class="stat-label">Features</div>
        </div>
        <div class="stat-card" style="border-bottom: 2px solid var(--color-issue);">
          <div class="stat-val" style="color: var(--color-issue);" id="stat-issue-val">0</div>
          <div class="stat-label">Issues</div>
        </div>
        <div class="stat-card" style="border-bottom: 2px solid var(--color-breaking);">
          <div class="stat-val" style="color: var(--color-breaking);" id="stat-breaking-val">0</div>
          <div class="stat-label">Breaking</div>
        </div>
        <div class="stat-card" style="border-bottom: 2px solid var(--color-change);">
          <div class="stat-val" style="color: var(--color-change);" id="stat-change-val">0</div>
          <div class="stat-label">Changes</div>
        </div>
      </div>
    </header>

    <!-- Search & Filters Segment -->
    <section class="search-filter-bar">
      <div class="search-box-container">
        <!-- SVG magnifying glass icon -->
        <svg viewBox="0 0 24 24">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search update notes, types, or dates..." aria-label="Search updates font text">
      </div>
      
      <div class="filter-pills" role="tablist" aria-label="Categories of updates filter tabs">
        <button class="filter-pill active" id="pill-all" role="tab" aria-selected="true" data-filter="all">All Updates</button>
        <button class="filter-pill" id="pill-features" role="tab" aria-selected="false" data-filter="feature">Features</button>
        <button class="filter-pill" id="pill-issues" role="tab" aria-selected="false" data-filter="issue">Issues</button>
        <button class="filter-pill" id="pill-breaking" role="tab" aria-selected="false" data-filter="breaking">Breaking</button>
        <button class="filter-pill" id="pill-announcement" role="tab" aria-selected="false" data-filter="announcement_change">Announcements & Changes</button>
      </div>
    </section>

    <!-- Main Feed Content Area -->
    <main>
      <div id="feed-container" class="feed-content">
        <!-- Skeleton loaders rendered by app.js initially -->
        <div class="skeleton-card">
          <div class="skeleton-badge"></div>
          <div class="skeleton-line long"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-badge"></div>
          <div class="skeleton-line long"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>
    </main>

  </div>

  <!-- Twitter Customizer Modal Overlay -->
  <div id="tweet-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title">
          <svg viewBox="0 0 24 24">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          Compose Post
        </h2>
        <button id="btn-close-modal" class="btn-close" aria-label="Close compose modal">
          <svg viewBox="0 0 24 24">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <textarea id="tweet-textarea" class="tweet-textarea" aria-label="Tweet message editor" maxlength="300"></textarea>
      </div>
      <div class="modal-footer">
        <span id="char-counter" class="char-counter">0 / 280</span>
        <button id="btn-submit-tweet" class="btn-submit-tweet">
          <svg viewBox="0 0 24 24" style="width: 14px; height: 14px; fill: currentColor;">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          Post to X
        </button>
      </div>
    </div>
  </div>

  <!-- Action Toast Notifications Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Custom JS Script -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
